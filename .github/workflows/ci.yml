name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore architecture-microservices-technical.sln

      - name: Build
        run: dotnet build architecture-microservices-technical.sln --no-restore --configuration Release

  frontend:
    name: Frontend (Angular 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/angular-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/angular-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build -- --configuration production

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ProductService image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/ProductService/Dockerfile
          push: false
          tags: eshop/product-service:ci
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build OrderService image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/OrderService/Dockerfile
          push: false
          tags: eshop/order-service:ci
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
