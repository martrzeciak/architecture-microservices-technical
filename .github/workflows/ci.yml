name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET 10)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/ProductService

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

  frontend:
    name: Frontend (Angular 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/angular-app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: frontend/angular-app/.nvmrc
          cache: npm
          cache-dependency-path: frontend/angular-app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate gRPC stubs from .proto
        run: npm run proto:gen

      - name: Lint
        run: npm run lint

      - name: Build (production)
        run: npm run build -- --configuration production

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ProductService image
        uses: docker/build-push-action@v5
        with:
          context: backend/ProductService
          push: false
          tags: eshop/product-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
